// ─── PHASES ─────────────────────────────────────────────────
const PH = {SETUP:"setup",PASS:"pass",REVEAL:"reveal",DISCUSS:"discuss",VOTE_PASS:"vote_pass",VOTE:"vote",SPY_GUESS:"spy_guess",RESULT:"result",LB:"lb"};

// ─── SHUFFLE ────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── CONFETTI ───────────────────────────────────────────────
function Confetti({color}) {
  const pieces = useRef(Array.from({length:24}, (_,i) => ({
    x: Math.random()*100, delay: Math.random()*2, dur: 1.5+Math.random()*2,
    size: 4+Math.random()*6, drift: -30+Math.random()*60, hue: i*15,
  }))).current;
  return (
    <div style={{position:"absolute",top:0,left:0,right:0,height:120,overflow:"hidden",pointerEvents:"none",zIndex:2}}>
      {pieces.map((p,i)=>(
        <div key={i} style={{
          position:"absolute",left:p.x+"%",top:-10,width:p.size,height:p.size*1.4,
          background:color||`hsl(${p.hue},80%,60%)`,borderRadius:1,opacity:.85,
          animation:`confDrop ${p.dur}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.drift}deg)`,
        }}/>
      ))}
    </div>
  );
}

// ─── FORMAT TIMER ───────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec < 10 ? "0" : ""}${sec}`;
}

// ─── MAIN APP ───────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState(PH.SETUP);
  const [names, setNames] = useState(["Pemain 1","Pemain 2","Pemain 3","Pemain 4","Pemain 5"]);
  const [playerCount, setPlayerCount] = useState(5);
  const [spyCount, setSpyCount] = useState(1);
  const [timerMin, setTimerMin] = useState(5);
  const [catFilter, setCatFilter] = useState(Object.fromEntries(CATEGORIES.map(c => [c, true])));
  const [tab, setTab] = useState("pemain");

  // Game state
  const [players, setPlayers] = useState([]);
  const [location, setLocation] = useState(null);
  const [revIdx, setRevIdx] = useState(0);
  const [showCard, setShowCard] = useState(false);

  // Discussion
  const [timeLeft, setTimeLeft] = useState(0);
  const [timerActive, setTimerActive] = useState(false);
  const timerRef = useRef(null);

  // Voting
  const [votes, setVotes] = useState({});
  const [voterIdx, setVoterIdx] = useState(0);
  const [elimIdx, setElimIdx] = useState(null);

  // Spy guess
  const [spyGuess, setSpyGuess] = useState(null);

  // Results
  const [winner, setWinner] = useState(null);
  const [roundScores, setRoundScores] = useState([]);
  const [lb, setLb] = useState({});
  const [roundNum, setRoundNum] = useState(0);
  const [usedLocs, setUsedLocs] = useState([]);
  const [scoreTab, setScoreTab] = useState("round");

  // Adjust names when player count changes
  useEffect(() => {
    const n = [...names];
    while (n.length < playerCount) n.push("Pemain " + (n.length + 1));
    setNames(n.slice(0, playerCount));
  }, [playerCount]);

  // Timer effect
  useEffect(() => {
    if (timerActive && timeLeft > 0) {
      timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
      return () => clearTimeout(timerRef.current);
    }
    if (timerActive && timeLeft === 0) {
      setTimerActive(false);
      // Time's up — spy wins
      endGame("spy_timeout");
    }
  }, [timerActive, timeLeft]);

  const enabledCats = Object.entries(catFilter).filter(([,v]) => v).map(([k]) => k);
  const availableLocs = LOCATIONS.filter(l => enabledCats.includes(l.cat));

  const pickLocation = () => {
    let pool = availableLocs.filter(l => !usedLocs.includes(l.name));
    if (pool.length === 0) {
      setUsedLocs([]);
      pool = availableLocs;
    }
    const loc = pool[Math.floor(Math.random() * pool.length)];
    setUsedLocs(prev => [...prev, loc.name]);
    return loc;
  };

  const startGame = () => {
    const loc = pickLocation();
    const shuffledRoles = shuffle(loc.roles);
    const spyIndices = new Set();
    while (spyIndices.size < spyCount) {
      spyIndices.add(Math.floor(Math.random() * playerCount));
    }
    const ps = names.map((name, idx) => ({
      name,
      isSpy: spyIndices.has(idx),
      role: spyIndices.has(idx) ? null : shuffledRoles[idx % shuffledRoles.length],
    }));
    setLocation(loc);
    setPlayers(ps);
    setRevIdx(0);
    setShowCard(false);
    setVotes({});
    setVoterIdx(0);
    setElimIdx(null);
    setSpyGuess(null);
    setWinner(null);
    setRoundScores([]);
    setTimeLeft(timerMin * 60);
    setTimerActive(false);
    setRoundNum(rn => rn + 1);
    setPhase(PH.PASS);
  };

  const endGame = (reason, eIdx, finalVotes) => {
    setTimerActive(false);
    clearTimeout(timerRef.current);
    if (reason === "spy_timeout") {
      // Spy wins — time ran out
      finishWithWinner("spy", null, votes);
    }
  };

  const finishWithWinner = (win, eIdx, finalVotes) => {
    setWinner(win);
    const scores = players.map((p, i) => {
      let pts = 0;
      const bd = [];
      if (win === "spy" || win === "spy_guess") {
        if (p.isSpy) {
          if (win === "spy") { pts += SCORE.SPY_NOT_CAUGHT; bd.push({l:"Spy tidak tertangkap",p:SCORE.SPY_NOT_CAUGHT}); }
          else { pts += SCORE.SPY_GUESS_RIGHT; bd.push({l:"Tebak lokasi benar",p:SCORE.SPY_GUESS_RIGHT}); }
        }
      }
      if (win === "spy_wrong_accuse") {
        if (p.isSpy) { pts += SCORE.SPY_WRONG_ACCUSE; bd.push({l:"Warga salah tuduh",p:SCORE.SPY_WRONG_ACCUSE}); }
        if (i === eIdx && !p.isSpy) { pts += SCORE.WRONGLY_ACCUSED; bd.push({l:"Dituduh salah",p:SCORE.WRONGLY_ACCUSED}); }
      }
      if (win === "warga") {
        if (!p.isSpy) { pts += SCORE.WARGA_WIN; bd.push({l:"Warga menang",p:SCORE.WARGA_WIN}); }
      }
      return {name:p.name, isSpy:p.isSpy, role:p.role, pts, bd};
    });
    setRoundScores(scores);
    const newLb = {...lb};
    scores.forEach(s => { newLb[s.name] = (newLb[s.name] || 0) + s.pts; });
    setLb(newLb);
    setPhase(PH.RESULT);
  };

  const submitVote = (targetIdx) => {
    const nv = {...votes, [voterIdx]: targetIdx};
    setVotes(nv);
    if (voterIdx + 1 < players.length) {
      setVoterIdx(voterIdx + 1);
      setPhase(PH.VOTE_PASS);
      return;
    }
    // Tally
    const tally = {};
    Object.values(nv).forEach(v => { tally[v] = (tally[v] || 0) + 1; });
    const maxV = Math.max(...Object.values(tally));
    const tied = Object.keys(tally).filter(k => tally[k] === maxV).map(Number);
    const topIdx = tied[Math.floor(Math.random() * tied.length)];
    setElimIdx(topIdx);
    if (players[topIdx].isSpy) {
      // Spy caught — give them a chance to guess
      setPhase(PH.SPY_GUESS);
    } else {
      // Wrong person — spy wins
      finishWithWinner("spy_wrong_accuse", topIdx, nv);
    }
  };

  const submitSpyGuess = (guessName) => {
    setSpyGuess(guessName);
    if (guessName === location.name) {
      finishWithWinner("spy_guess", elimIdx, votes);
    } else {
      finishWithWinner("warga", elimIdx, votes);

  const lbEntries = Object.entries(lb).sort((a,b) => b[1] - a[1]);
  const maxLb = lbEntries.length ? lbEntries[0][1] : 1;

  const curPlayer = players[revIdx];

        Pastikan hanya <b style={{color:"#f0ede8"}}>{nextName}</b> yang melihat layar
      </div>
      <button className="btn" onClick={onReady}>AKU SIAP</button>
    </div>
  );

  return (
    <div style={{minHeight:"100dvh",background:"#0a0a0f",color:"#f0ede8",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px 56px"}}>

        .card{background:#12121a;border:1px solid #2a2a3a;border-radius:8px;padding:20px;width:100%;max-width:460px;position:relative;overflow:hidden}
        .btn{background:#ff3c3c;color:#fff;border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;width:100%;border-radius:6px;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .btn:hover:not(:disabled){background:#ff5555;transform:translateY(-1px);box-shadow:0 4px 20px #ff3c3c55}

        .rbig{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,9vw,68px);letter-spacing:5px;text-align:center;line-height:1.1}
        .sl{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:0}

        .srow:hover{background:#1a1a28}
        .srow:active{background:#1f1f30}
        .pts{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;min-width:56px;text-align:right;flex-shrink:0}
        .bkd{background:#0e0e18;border:1px solid #2a2a3a;border-radius:6px;padding:10px 12px;margin-top:4px}

        .role-badge{display:inline-flex;align-items:center;gap:6px;border-radius:4px;padding:6px 14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
        .round-badge{background:#1a1a28;border:1px solid #2a2a3a;border-radius:20px;padding:4px 14px;font-family:'Space Mono',monospace;font-size:10px;color:#888;letter-spacing:2px;display:inline-block}
        .cat-btn{background:#1a1a28;border:1px solid #2a2a3a;color:#666;padding:6px 12px;border-radius:16px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;letter-spacing:1px}
        .cat-btn.on{border-color:#ff3c3c;color:#ff3c3c;background:#2a0000}

        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

      `}</style>
      <div className="sl" />
      <div className="wrap">

        {/* HEADER */}

          <div className="T">SPY LOCATION</div>

                    <div className="SUB">jumlah spy</div>

                    <button className="cbt" onClick={() => setSpyCount(Math.min(2, spyCount + 1))} disabled={spyCount >= 2 || spyCount >= playerCount - 2}>+</button>

                {/* Player names */}
                <div className="SUB" style={{marginBottom:10}}>nama pemain</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>

                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:"#555",minWidth:20}}>{i+1}</span>
                      <input className="inp" value={n}
                        onChange={e => {const u=[...names]; u[i]=e.target.value; setNames(u);}}
                        placeholder={"Pemain " + (i+1)}
                      />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === "waktu" && (
              <div>
                <div className="SUB" style={{marginBottom:16}}>durasi diskusi</div>
                <div style={{display:"flex",gap:8}}>
                  {[3,5,8].map(m => (
                    <button key={m} onClick={() => setTimerMin(m)}
                      style={{
                        flex:1,background:timerMin===m?"#2a0000":"#1a1a28",
                        border:"1px solid "+(timerMin===m?"#ff3c3c":"#2a2a3a"),
                        color:timerMin===m?"#ff3c3c":"#666",
                        padding:"16px 0",borderRadius:6,cursor:"pointer",

                    <div style={{marginBottom:8}}>1. Setiap pemain melihat <b style={{color:"#3cff6e"}}>lokasi</b> dan <b style={{color:"#3cff6e"}}>perannya</b></div>
                    <div style={{marginBottom:8}}>2. <b style={{color:"#ff3c3c"}}>Spy</b> tidak tahu lokasinya</div>
                    <div style={{marginBottom:8}}>3. Tanya satu sama lain tentang lokasi</div>
                    <div style={{marginBottom:8}}>4. Vote siapa yang paling mencurigakan</div>

                    {c:"Warga salah tuduh non-spy",p:"+4 spy",clr:"#ff3c3c"},

                      onClick={() => {
                        const next = {...catFilter, [cat]: !catFilter[cat]};
                        // Ensure at least one category is on

                      }}

                      {cat}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:11,color:"#555",letterSpacing:1,marginBottom:12}}>
                  {availableLocs.length} lokasi tersedia

                    <div key={cat} style={{marginBottom:12}}>

                  </div>

                <button className="btn" style={{marginTop:12}} onClick={() => {

              Tebak lokasinya untuk tetap menang.
            </div>
            <div className="SUB" style={{marginBottom:8}}>pilih lokasi</div>
            <div className="loc-list" style={{maxHeight:240}}>
              {allLocationNames.map(n => (
                <button key={n} className={"loc-item" + (spyGuess === n ? " sel" : "")}
                  onClick={() => setSpyGuess(n)}
                >
                  {n}
                </button>
              ))}
            </div>
            <button className="btn" style={{marginTop:16}} disabled={!spyGuess}
              onClick={() => submitSpyGuess(spyGuess)}
            >
              TEBAK LOKASI
            </button>
          </div>
        )}

        {/* ═══════ RESULT ═══════ */}
        {phase === PH.RESULT && (
          <div className="card fi" style={{textAlign:"center",position:"relative"}}>
            <Confetti color={winner === "warga" ? "#3cff6e" : "#ff3c3c"} />
            <div style={{fontSize:56,marginBottom:8}}>
              {winner === "warga" ? "🎉" : winner === "spy_guess" ? "🕵️" : "💀"}
            </div>
            <div className="rbig" style={{color:winner === "warga" ? "#3cff6e" : "#ff3c3c",marginBottom:8}}>
              {winner === "warga" ? "WARGA MENANG!" : winner === "spy_guess" ? "SPY MENANG!" : winner === "spy_wrong_accuse" ? "SPY MENANG!" : "SPY MENANG!"}
            </div>
            <div style={{fontSize:12,color:"#888",marginBottom:16,lineHeight:1.6}}>
              {winner === "warga" && "Spy tertangkap dan gagal menebak lokasi!"}
              {winner === "spy_guess" && "Spy tertangkap tapi berhasil menebak lokasi!"}
              {winner === "spy_wrong_accuse" && (<span>Warga salah tuduh <b style={{color:"#f0ede8"}}>{players[elimIdx]?.name}</b>!</span>)}
              {winner === "spy" && "Waktu habis tanpa voting!"}
              {winner === "spy_timeout" && "Waktu habis tanpa voting!"}
            </div>
            <div className="hr"/>

            {/* Location reveal */}
            <div style={{marginTop:12,marginBottom:8}}>
              <div className="SUB" style={{marginBottom:6}}>lokasinya adalah</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:clamp(28,7,44),letterSpacing:3,color:"#ffcc00"}}>{location?.name}</div>
              <div style={{fontSize:11,color:"#555",marginTop:4}}>{location?.cat}</div>
            </div>

            {/* Player roles */}
            <div className="hr"/>
            <div style={{display:"flex",marginBottom:12,marginTop:12}}>
              {[["round","Ronde"],["total","Total"]].map(([k,l]) => (
                <button key={k} className={"tab" + (scoreTab===k?" a":"")} onClick={() => setScoreTab(k)}>{l}</button>
              ))}
            </div>

            {scoreTab === "round" && (
              <div>
                {roundScores.map((s, i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1a1a28"}}>
                    <div style={{fontSize:20,width:28,textAlign:"center"}}>{s.isSpy ? "🕵️" : "👤"}</div>
                    <div style={{flex:1,textAlign:"left"}}>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#f0ede8"}}>{s.name}</div>
                      <div style={{fontSize:10,color:s.isSpy?"#ff3c3c":"#3cff6e",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2}}>
                        {s.isSpy ? "SPY" : s.role}
                      </div>
                      {s.bd.length > 0 && (
                        <div style={{marginTop:2}}>
                          {s.bd.map((b,j) => (
                            <span key={j} style={{fontSize:9,color:"#555",marginRight:8}}>{b.l}: <span style={{color:b.p >= 0 ? "#3cff6e" : "#ff3c3c"}}>{b.p >= 0 ? "+" : ""}{b.p}</span></span>
                          ))}
                        </div>
                      )}
                    </div>
                    <div className="pts" style={{color:s.pts > 0 ? "#3cff6e" : s.pts < 0 ? "#ff3c3c" : "#555"}}>
                      {s.pts > 0 ? "+" : ""}{s.pts}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {scoreTab === "total" && (
              <div>
                {lbEntries.map(([name, pts], i) => (
                  <div key={name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1a1a28"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:i<3?"#ffcc00":"#555",minWidth:28,textAlign:"center"}}>
                      {i < 3 ? ["🥇","🥈","🥉"][i] : i+1}
                    </div>
                    <div style={{flex:1,textAlign:"left"}}>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#f0ede8"}}>{name}</div>
                      <div className="lbw"><div className="lbb" style={{width:Math.max(4,(pts/Math.max(maxLb,1))*100)+"%",background:i===0?"#ffcc00":"#ff3c3c"}}/></div>
                    </div>
                    <div className="pts" style={{color:"#ffcc00"}}>{pts}</div>
                  </div>
                ))}
              </div>
            )}

            <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:8}}>
              <button className="btn" onClick={startGame}>MAIN LAGI</button>
              <button className="ghost" onClick={() => setPhase(PH.SETUP)}>PENGATURAN</button>
            </div>
          </div>
        )}

        {/* ═══════ LEADERBOARD ═══════ */}
        {phase === PH.LB && (
          <div className="card fi" style={{textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:8}}>🏆</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:4,color:"#ffcc00",marginBottom:4}}>LEADERBOARD</div>
            <div className="SUB" style={{marginBottom:16}}>{roundNum} ronde dimainkan</div>
            {lbEntries.length === 0 ? (
              <div style={{color:"#555",fontSize:12,padding:"20px 0"}}>Belum ada skor</div>
            ) : (
              <div>
                {lbEntries.map(([name, pts], i) => (
                  <div key={name} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #1a1a28"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:i<3?"#ffcc00":"#555",minWidth:32,textAlign:"center"}}>
                      {i < 3 ? ["🥇","🥈","🥉"][i] : i+1}
                    </div>
                    <div style={{flex:1,textAlign:"left"}}>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:14,color:"#f0ede8"}}>{name}</div>
                      <div className="lbw"><div className="lbb" style={{width:Math.max(4,(pts/Math.max(maxLb,1))*100)+"%",background:i===0?"#ffcc00":"#ff3c3c"}}/></div>
                    </div>
                    <div className="pts" style={{color:"#ffcc00"}}>{pts}</div>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:8}}>
              <button className="btn" onClick={startGame}>MAIN LAGI</button>
              <button className="ghost" onClick={() => setPhase(PH.SETUP)}>PENGATURAN</button>
              <button className="ghost" onClick={resetAll}>RESET SEMUA</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// Helper — inline clamp for font sizes in JSX
function clamp(min, vw, max) {
  return `clamp(${min}px, ${vw}vw, ${max}px)`;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
