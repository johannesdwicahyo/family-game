function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── CONFETTI ───────────────────────────────────────────────
function Confetti({color}) {
  const pieces = useRef(Array.from({length:30}, (_,i) => ({
    x: Math.random()*100, delay: Math.random()*1.5, dur: 1.5+Math.random()*2,
    size: 4+Math.random()*6, drift: -30+Math.random()*60, hue: i*12,
  }))).current;
  return (
    <div style={{position:"absolute",top:0,left:0,right:0,height:160,overflow:"hidden",pointerEvents:"none",zIndex:2}}>
      {pieces.map((p,i)=>(
        <div key={i} style={{
          position:"absolute",left:p.x+"%",top:-10,width:p.size,height:p.size*1.4,
          background:color||`hsl(${p.hue},80%,60%)`,borderRadius:1,opacity:.85,
          animation:`confDrop ${p.dur}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.drift}deg)`,
        }}/>
      ))}
    </div>
  );
}

// ─── CIRCULAR TIMER ─────────────────────────────────────────
function CircularTimer({timeLeft, totalTime, size=70}) {
  const r = (size-8)/2;
  const c = 2*Math.PI*r;
  const pct = totalTime > 0 ? timeLeft / totalTime : 1;
  const offset = c * (1 - pct);
  const col = pct > 0.5 ? "#3cff6e" : pct > 0.25 ? "#ffcc00" : "#ff3c3c";
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a1a28" strokeWidth={4} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={4}
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.5s linear, stroke 0.3s"}} />
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        fill={col} fontSize={size*0.32} fontFamily="'Bebas Neue',sans-serif"
        letterSpacing={2} style={{transform:"rotate(90deg)",transformOrigin:"center"}}>
        {timeLeft}
      </text>
    </svg>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState("setup"); // setup, playing, reveal, result
  const [players, setPlayers] = useState(["Pemain 1","Pemain 2","Pemain 3","Pemain 4"]);
  const [numPlayers, setNumPlayers] = useState(4);
  const [totalRounds, setTotalRounds] = useState(15);
  const [categories, setCategories] = useState(CATEGORIES.map(c=>c.id));
  const [difficulty, setDifficulty] = useState("campur");
  const [useTimer, setUseTimer] = useState(true);
  const [setupTab, setSetupTab] = useState("pemain");

  // Game state
  const [roundNum, setRoundNum] = useState(0);
  const [puzzleQueue, setPuzzleQueue] = useState([]);
  const [currentPuzzle, setCurrentPuzzle] = useState(null);
  const [timeLeft, setTimeLeft] = useState(0);
  const [totalTime, setTotalTime] = useState(0);
  const [hintShown, setHintShown] = useState(false);
  const [scores, setScores] = useState({});
  const [roundResult, setRoundResult] = useState(null); // {winner, puzzle, timeTaken}
  const [history, setHistory] = useState([]);
  const [flashColor, setFlashColor] = useState(null);
  const timerRef = useRef(null);
  const startTimeRef = useRef(null);

  // Update player names array when numPlayers changes
  useEffect(() => {
    setPlayers(prev => {
      const n = [...prev];
      while (n.length < numPlayers) n.push("Pemain " + (n.length + 1));
      return n.slice(0, numPlayers);
    });
  }, [numPlayers]);

  const toggleCategory = (catId) => {
    if (catId === "all") {
      setCategories(prev => prev.length === CATEGORIES.length ? [] : CATEGORIES.map(c=>c.id));
      return;
    }
    setCategories(prev => {
      if (prev.includes(catId)) return prev.filter(c=>c!==catId);
      return [...prev, catId];
    });
  };

  const activeCatCount = categories.length;

  const buildQueue = () => {
    let pool = PUZZLES.filter(p => categories.includes(p.cat));
    if (difficulty !== "campur") pool = pool.filter(p => p.diff === difficulty);
    const shuffled = shuffle(pool);
    // If we need more than available, cycle
    const q = [];
    while (q.length < totalRounds) {
      q.push(...shuffle(pool));
    }
    return q.slice(0, totalRounds);
  };

  const startGame = () => {
    const q = buildQueue();
    setPuzzleQueue(q);
    setScores(Object.fromEntries(players.map(p=>[p,{total:0,correct:0,hard:0,times:[]}])));
    setHistory([]);
    setRoundNum(0);
    startRound(q, 0);
  };

  const startRound = (q, rn) => {
    const puzzle = q[rn];
    setCurrentPuzzle(puzzle);
    setRoundNum(rn + 1);
    setHintShown(false);
    setRoundResult(null);
    setFlashColor(null);
    const t = useTimer ? DIFF_TIME[puzzle.diff] : 0;
    setTotalTime(t);
    setTimeLeft(t);
    startTimeRef.current = Date.now();
    setPhase("playing");
  };

  // Timer effect
  useEffect(() => {
    if (phase !== "playing" || !useTimer || totalTime === 0) return;
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) {
          clearInterval(timerRef.current);
          handleTimeout();
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, totalTime, roundNum]);

  // Hint trigger
  useEffect(() => {
    if (phase !== "playing" || !useTimer || totalTime === 0) return;
    if (timeLeft <= Math.floor(totalTime / 2) && !hintShown) {
      setHintShown(true);
    }
  }, [timeLeft, phase, totalTime, hintShown]);

  // No-timer mode: show hint after 10 seconds
  useEffect(() => {
    if (phase !== "playing" || useTimer) return;
    const t = setTimeout(() => setHintShown(true), 10000);
    return () => clearTimeout(t);
  }, [phase, useTimer, roundNum]);

  const handleTimeout = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    setFlashColor("#ffcc00");
    setRoundResult({winner:null, puzzle:currentPuzzle, timeTaken:null});
    setHistory(prev => [...prev, {puzzle:currentPuzzle, winner:null, timeTaken:null}]);
    setPhase("reveal");
  };

  const handleSkip = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    setFlashColor("#ffcc00");
    setRoundResult({winner:null, puzzle:currentPuzzle, timeTaken:null});
    setHistory(prev => [...prev, {puzzle:currentPuzzle, winner:null, timeTaken:null}]);
    setPhase("reveal");
  };

  const handlePlayerGuess = (playerName) => {
    if (timerRef.current) clearInterval(timerRef.current);
    const timeTaken = useTimer ? Math.round((Date.now() - startTimeRef.current) / 1000) : null;
    const pts = DIFF_MAP[currentPuzzle.diff];
    setFlashColor("#3cff6e");
    setScores(prev => {
      const s = {...prev};
      const ps = {...s[playerName]};
      ps.total += pts;
      ps.correct += 1;
      if (currentPuzzle.diff === "sulit") ps.hard += 1;
      if (timeTaken !== null) ps.times.push(timeTaken);
      s[playerName] = ps;
      return s;
    });
    setRoundResult({winner:playerName, puzzle:currentPuzzle, timeTaken, pts});
    setHistory(prev => [...prev, {puzzle:currentPuzzle, winner:playerName, timeTaken, pts}]);
    setPhase("reveal");
  };

  const nextRound = () => {
    setFlashColor(null);
    if (roundNum >= totalRounds) {
      setPhase("result");
    } else {
      startRound(puzzleQueue, roundNum);
    }
  };

  const resetToSetup = () => {
    setPhase("setup");
    if (timerRef.current) clearInterval(timerRef.current);
  };

  // Result calculations
  const sortedScores = useMemo(() => {
    return Object.entries(scores)
      .map(([name, s]) => ({name, ...s}))
      .sort((a,b) => b.total - a.total || b.correct - a.correct);
  }, [scores]);

  const maxScore = sortedScores.length ? sortedScores[0].total : 1;

  const brainEmoji = useMemo(() => {
    if (!sortedScores.length) return null;
    const top = [...sortedScores].sort((a,b)=>b.correct-a.correct)[0];
    return top.correct > 0 ? top : null;
  }, [sortedScores]);

  const fastestPlayer = useMemo(() => {
    if (!useTimer) return null;
    let best = null;
    sortedScores.forEach(s => {
      if (s.times.length > 0) {
        const avg = s.times.reduce((a,b)=>a+b,0)/s.times.length;
        if (!best || avg < best.avg) best = {name:s.name, avg};
      }
    });
    return best;
  }, [sortedScores, useTimer]);

  const hardMaster = useMemo(() => {
    if (!sortedScores.length) return null;
    const top = [...sortedScores].sort((a,b)=>b.hard-a.hard)[0];
    return top.hard > 0 ? top : null;

            )}

            {/* Emoji Display */}
            <div className="emoji-display" style={{animation:"pulseGlow 2s ease-in-out infinite"}}>
              {currentPuzzle.emoji}
            </div>

            {/* Hint */}
            {hintShown && (
              <div className="hint-text">
                <span style={{fontSize:14,marginRight:6}}>💡</span>
                {currentPuzzle.hint}
              </div>
            )}

            {!hintShown && (
              <div style={{fontSize:10,color:"#444",marginTop:8,letterSpacing:2}}>
                {useTimer ? `HINT MUNCUL DALAM ${Math.max(0, timeLeft - Math.floor(totalTime/2))} DETIK` : "HINT SEGERA MUNCUL..."}
              </div>
            )}

            <hr className="hr" />

            {/* Player buttons */}
            <div className="SUB" style={{marginBottom:10}}>siapa yang benar?</div>
            <div style={{display:"grid",gridTemplateColumns:players.length <= 4 ? "1fr 1fr" : "1fr 1fr 1fr", gap:8}}>
              {players.map((p,i) => (
                <button key={i} className="player-btn" onClick={()=>handlePlayerGuess(p)}>
                  {p}
                </button>
              ))}
            </div>

            <div style={{marginTop:12}}>
              <button className="ghost" onClick={handleSkip}>
                TIDAK ADA YANG BENAR
              </button>
            </div>

            {/* Show hint button if no timer */}
            {!useTimer && !hintShown && (
              <div style={{marginTop:8}}>
                <button className="ghost" onClick={()=>setHintShown(true)} style={{fontSize:10,padding:6}}>
                  TAMPILKAN HINT
                </button>
              </div>
            )}
          </div>
        )}

        {/* ─── REVEAL ─── */}
        {phase === "reveal" && roundResult && (
          <div className="card fi" style={{textAlign:"center",
            animation: flashColor === "#3cff6e" ? "flashGreen .8s ease-out" : flashColor === "#ffcc00" ? "flashYellow .8s ease-out" : "none"
          }}>
            {roundResult.winner && <Confetti />}

            {roundResult.winner ? (
              <div>
                <div style={{fontSize:48,marginBottom:8}}>🎉</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:4,color:"#3cff6e",marginBottom:4}}>
                  BENAR!
                </div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:4,color:"#ff3c3c",marginBottom:12}}>
                  {roundResult.winner}
                </div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:"#ffcc00",letterSpacing:2}}>
                  +{roundResult.pts} POIN
                </div>
              </div>
            ) : (
              <div>
                <div style={{fontSize:48,marginBottom:8}}>😅</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:4,color:"#ffcc00",marginBottom:4}}>
                  WAKTU HABIS!
                </div>
                <div style={{fontSize:13,color:"#888",marginBottom:12}}>Tidak ada yang menebak dengan benar</div>
              </div>
            )}

            <hr className="hr" />

            {/* Show answer */}
            <div style={{marginBottom:16}}>
              <div className="emoji-display" style={{marginBottom:8}}>{roundResult.puzzle.emoji}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:4,color:"#f0ede8"}}>
                = {roundResult.puzzle.answer}
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8}}>
                <span className="cat-tag">{roundResult.puzzle.cat}</span>
                <span>{diffStars(roundResult.puzzle.diff)}</span>
              </div>
            </div>

            {/* Quick scoreboard */}
            <div style={{background:"#0e0e18",borderRadius:6,padding:10,marginBottom:16,border:"1px solid #2a2a3a"}}>
              <div className="SUB" style={{marginBottom:8}}>skor sementara</div>
              {Object.entries(scores).sort((a,b)=>b[1].total-a[1].total).map(([name,s],i) => (
                <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",
                  borderBottom: i < Object.keys(scores).length - 1 ? "1px solid #1a1a28" : "none"}}>
                  <span style={{fontSize:12,color:name===roundResult?.winner?"#3cff6e":"#888"}}>{name}</span>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#f0ede8",letterSpacing:2}}>{s.total}</span>
                </div>
              ))}
            </div>

            <button className="btn" onClick={nextRound}>
              {roundNum >= totalRounds ? "LIHAT HASIL" : "LANJUT"}
            </button>
          </div>
        )}

        {/* ─── RESULT ─── */}
        {phase === "result" && (
          <div className="card fi">
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:48,marginBottom:4}}>🏆</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:4,color:"#ffcc00"}}>HASIL AKHIR</div>
            </div>

            {/* Leaderboard */}
            <div style={{marginBottom:20}}>
              {sortedScores.map((s,i) => (
                <div key={s.name} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",
                  borderBottom: i < sortedScores.length - 1 ? "1px solid #1a1a28" : "none"}}>
                  <span style={{fontSize:24,width:32,textAlign:"center"}}>{i < 3 ? MEDALS[i] : (i+1)}</span>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,
                      color:i===0?"#ffcc00":"#f0ede8"}}>{s.name}</div>
                    <div className="lbw">
                      <div className="lbb" style={{width:(maxScore>0?s.total/maxScore*100:0)+"%",
                        background:i===0?"#ffcc00":i===1?"#c0c0c0":i===2?"#cd7f32":"#ff3c3c"}} />
                    </div>
                  </div>
                  <div className="pts" style={{color:i===0?"#ffcc00":"#f0ede8"}}>{s.total}</div>
                </div>
              ))}
            </div>

            {/* Fun stats */}
            <div className="SUB" style={{marginBottom:10}}>penghargaan</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
              {brainEmoji && (
                <div className="stat-card">
                  <div style={{fontSize:24}}>🧠</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"#888",marginBottom:2}}>OTAK EMOJI</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#3cff6e",letterSpacing:2}}>{brainEmoji.name}</div>
                  <div style={{fontSize:10,color:"#666"}}>{brainEmoji.correct} tebakan benar</div>
                </div>
              )}
              {fastestPlayer && (
                <div className="stat-card">
                  <div style={{fontSize:24}}>&#9889;</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"#888",marginBottom:2}}>KILAT</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#ffcc00",letterSpacing:2}}>{fastestPlayer.name}</div>
                  <div style={{fontSize:10,color:"#666"}}>rata-rata {fastestPlayer.avg.toFixed(1)} detik</div>
                </div>
              )}
              {hardMaster && (
                <div className="stat-card">
                  <div style={{fontSize:24}}>💪</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"#888",marginBottom:2}}>PENAKLUK SULIT</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#ff3c3c",letterSpacing:2}}>{hardMaster.name}</div>
                  <div style={{fontSize:10,color:"#666"}}>{hardMaster.hard} soal sulit dijawab</div>
                </div>
              )}
            </div>

            {/* Review all puzzles */}
            <div className="SUB" style={{marginBottom:10}}>review semua soal</div>
            <div style={{maxHeight:300,overflowY:"auto",marginBottom:16,border:"1px solid #2a2a3a",borderRadius:6,padding:8,background:"#0e0e18"}}>
              {history.map((h,i) => (
                <div key={i} className="review-row">
                  <span style={{fontSize:10,color:"#555",minWidth:20}}>{i+1}</span>
                  <span style={{fontSize:20,minWidth:60}}>{h.puzzle.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:"#f0ede8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{h.puzzle.answer}</div>
                    <div style={{fontSize:10,color:h.winner?"#3cff6e":"#666"}}>{h.winner || "Tidak ada"}</div>
                  </div>
                  <span style={{fontSize:10,color:DIFF_COLOR[h.puzzle.diff]}}>{diffStars(h.puzzle.diff)}</span>
                </div>
              ))}
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button className="btn" onClick={()=>{
                setPhase("setup");
                if (timerRef.current) clearInterval(timerRef.current);
              }}>MAIN LAGI</button>
              <button className="ghost" onClick={resetToSetup}>PENGATURAN</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
