<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SAMBUNG KATA - Permainan Kata Keluarga</title>
<meta name="description" content="Permainan sambung kata keluarga seru! Sambung kata dari huruf terakhir."/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{background:#0a0a0f;color:#f0ede8;font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  #root{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 56px}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── STARTING WORDS ─────────────────────────────────────────
const STARTING_WORDS = [
  "MAKAN","BELAJAR","BERMAIN","RUMAH","SINGA","PINTAR","MENULIS","BERLARI",
  "TEMAN","BINTANG","KUCING","DENGAN","SEKOLAH","BERMIMPI","INDAH","KEMBALI",
  "PERCAYA","MEMILIH","TERBANG","DATANG","SENANG","JALAN","PELANGI","MEMBACA",
  "PULANG","BERANI","DUDUK","MALAM","PAGI","CANTIK"
];

// ─── DIFFICULTY CONFIG ──────────────────────────────────────
const DIFF = {
  mudah:  { label:"Mudah",  letters:1, timerMin:12, timerMax:18, desc:"1 huruf terakhir, 12-18 detik" },
  sedang: { label:"Sedang", letters:2, timerMin:8,  timerMax:14, desc:"2 huruf terakhir, 8-14 detik" },
  sulit:  { label:"Sulit",  letters:2, timerMin:5,  timerMax:10, desc:"2 huruf terakhir, 5-10 detik" },
};

const PH = { SETUP:"setup", PASS:"pass", PLAY:"play", BOOM:"boom", ELIM:"elim", RESULT:"result" };

// ─── SHUFFLE ────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomWord() {
  return STARTING_WORDS[Math.floor(Math.random() * STARTING_WORDS.length)];
}

function getRequired(word, numLetters) {
  return word.slice(-numLetters).toUpperCase();
}

// ─── CONFETTI ───────────────────────────────────────────────
function Confetti() {
  const pieces = useRef(Array.from({length:40}, (_,i) => ({
    x: Math.random()*100, delay: Math.random()*2, dur: 1.5+Math.random()*2.5,
    size: 4+Math.random()*8, drift: -40+Math.random()*80, hue: i*9,
  }))).current;
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,height:"100vh",overflow:"hidden",pointerEvents:"none",zIndex:100}}>
      {pieces.map((p,i)=>(
        <div key={i} style={{
          position:"absolute",left:p.x+"%",top:-12,width:p.size,height:p.size*1.4,
          background:`hsl(${p.hue},80%,60%)`,borderRadius:2,opacity:.9,
          animation:`confDrop ${p.dur}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.drift}deg)`,
        }}/>
      ))}
    </div>
  );
}

// ─── EXPLOSION ──────────────────────────────────────────────
function Explosion() {
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:90,pointerEvents:"none"}}>
      <div style={{fontSize:"clamp(80px,25vw,160px)",animation:"boomPulse 0.6s ease-out forwards"}}>💥</div>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState(PH.SETUP);

  // Setup state
  const [names, setNames] = useState(["Pemain 1","Pemain 2","Pemain 3","Pemain 4"]);
  const [playerCount, setPlayerCount] = useState(4);
  const [difficulty, setDifficulty] = useState("sedang");
  const [livesPerPlayer, setLivesPerPlayer] = useState(3);
  const [customWord, setCustomWord] = useState("");
  const [setupTab, setSetupTab] = useState("pemain");

  // Game state
  const [players, setPlayers] = useState([]); // {name, lives, alive, streak}
  const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
  const [currentWord, setCurrentWord] = useState("");
  const [requiredStart, setRequiredStart] = useState("");
  const [usedWords, setUsedWords] = useState([]);
  const [wordChain, setWordChain] = useState([]); // {word, player}
  const [inputVal, setInputVal] = useState("");
  const [errorMsg, setErrorMsg] = useState("");
  const [showError, setShowError] = useState(false);
  const [showSuccess, setShowSuccess] = useState(false);
  const [timerMax, setTimerMax] = useState(10);
  const [timerLeft, setTimerLeft] = useState(10);
  const [timerRunning, setTimerRunning] = useState(false);
  const [showExplosion, setShowExplosion] = useState(false);
  const [elimOrder, setElimOrder] = useState([]);
  const [winner, setWinner] = useState(null);
  const [longestChain, setLongestChain] = useState(0);
  const [longestWord, setLongestWord] = useState("");
  const [totalWords, setTotalWords] = useState(0);
  const [passReady, setPassReady] = useState(false);
  const [boomPlayer, setBoomPlayer] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);

  const inputRef = useRef(null);
  const timerRef = useRef(null);
  const timerStartRef = useRef(null);
  const timerDurationRef = useRef(10);
  const currentPlayerIdxRef = useRef(0);
  const diffRef = useRef(DIFF[difficulty]);
  const timeoutHandlerRef = useRef(null);

  const diff = DIFF[difficulty];
  diffRef.current = diff;
  currentPlayerIdxRef.current = currentPlayerIdx;

  // Adjust names array when player count changes
  useEffect(() => {
    setNames(prev => {
      const n = [...prev];
      while (n.length < playerCount) n.push("Pemain " + (n.length + 1));
      return n.slice(0, playerCount);
    });
  }, [playerCount]);

  // Keep timeout handler ref current
  const handleTimeout = () => {
    const cidx = currentPlayerIdxRef.current;
    setPlayers(prev => {
      const next = prev.map((p,i) => {
        if (i !== cidx) return p;
        const newLives = p.lives - 1;
        return {...p, lives: newLives, alive: newLives > 0, streak: 0};
      });
      const justDied = next[cidx].lives <= 0;
      setBoomPlayer({name: prev[cidx].name, died: justDied});
      setShowExplosion(true);
      setTimeout(() => setShowExplosion(false), 1500);
      setPhase(PH.BOOM);
      if (justDied) {
        setElimOrder(eo => [...eo, prev[cidx].name]);
      }
      return next;
    });
  };
  timeoutHandlerRef.current = handleTimeout;

  // Timer with requestAnimationFrame for smooth visual
  useEffect(() => {
    if (!timerRunning) {
      if (timerRef.current) cancelAnimationFrame(timerRef.current);
      return;
    }
    timerStartRef.current = performance.now();
    timerDurationRef.current = timerLeft;

    const tick = () => {
      const elapsed = (performance.now() - timerStartRef.current) / 1000;
      const remaining = timerDurationRef.current - elapsed;
      if (remaining <= 0) {
        setTimerLeft(0);
        setTimerRunning(false);
        timeoutHandlerRef.current();
        return;
      }
      setTimerLeft(remaining);
      timerRef.current = requestAnimationFrame(tick);
    };
    timerRef.current = requestAnimationFrame(tick);
    return () => { if (timerRef.current) cancelAnimationFrame(timerRef.current); };
  }, [timerRunning]);

  const afterBoom = () => {
    const d = diffRef.current;
    setPlayers(prev => {
      const aliveNow = prev.filter(p => p.alive);
      if (aliveNow.length <= 1) {
        if (aliveNow.length === 1) setWinner(aliveNow[0].name);
        setShowConfetti(true);
        setPhase(PH.RESULT);
        return prev;
      }
      const newWord = randomWord();
      setCurrentWord(newWord);
      setRequiredStart(getRequired(newWord, d.letters));
      setUsedWords(uw => [...uw, newWord]);
      setWordChain(wc => [...wc, {word: newWord, player: "—"}]);
      const nextTimer = d.timerMin + Math.random() * (d.timerMax - d.timerMin);
      setTimerMax(nextTimer);
      setTimerLeft(nextTimer);
      setInputVal("");
      setErrorMsg("");

      let nextIdx = currentPlayerIdxRef.current;
      do {
        nextIdx = (nextIdx + 1) % prev.length;
      } while (!prev[nextIdx].alive);
      setCurrentPlayerIdx(nextIdx);
      setPhase(PH.PASS);
      return prev;
    });
  };

  const startGame = () => {
    const startWord = customWord.trim() ? customWord.trim().toUpperCase() : randomWord();
    const ps = names.map(name => ({name, lives: livesPerPlayer, alive: true, streak: 0}));
    setPlayers(ps);
    setCurrentWord(startWord);
    setRequiredStart(getRequired(startWord, diff.letters));
    setUsedWords([startWord.toUpperCase()]);
    setWordChain([{word: startWord, player: "—"}]);
    setInputVal("");
    setErrorMsg("");
    setElimOrder([]);
    setWinner(null);
    setLongestChain(0);
    setLongestWord(startWord);
    setTotalWords(0);
    setShowConfetti(false);
    setCurrentPlayerIdx(0);
    const nextTimer = diff.timerMin + Math.random() * (diff.timerMax - diff.timerMin);
    setTimerMax(nextTimer);
    setTimerLeft(nextTimer);
    setPhase(PH.PASS);
  };

  const startTurn = () => {
    setPassReady(false);
    setTimerRunning(true);
    setPhase(PH.PLAY);
    setTimeout(() => { inputRef.current?.focus(); }, 100);
  };

  const submitWord = () => {
    const word = inputVal.trim().toUpperCase();
    if (!word) return;

    // Validate
    if (word.length < 3) {
      flashError("Minimal 3 huruf!");
      return;
    }
    if (!word.startsWith(requiredStart)) {
      flashError(`Kata harus dimulai dengan '${requiredStart}'!`);
      return;
    }
    if (usedWords.includes(word)) {
      flashError("Kata sudah pernah dipakai!");
      return;
    }

    // Valid!
    setTimerRunning(false);
    setShowSuccess(true);
    setTimeout(() => setShowSuccess(false), 400);

    const newUsed = [...usedWords, word];
    const playerName = players[currentPlayerIdx].name;
    const newChain = [...wordChain, {word, player: playerName}];
    setUsedWords(newUsed);
    setWordChain(newChain);
    setCurrentWord(word);
    setRequiredStart(getRequired(word, diff.letters));
    setTotalWords(prev => prev + 1);
    if (word.length > longestWord.length) setLongestWord(word);

    // Update streak
    setPlayers(prev => prev.map((p,i) => {
      if (i !== currentPlayerIdx) return p;
      const newStreak = p.streak + 1;
      if (newStreak > longestChain) setLongestChain(newStreak);
      return {...p, streak: newStreak};
    }));

    // Next player
    let nextIdx = currentPlayerIdx;
    do {
      nextIdx = (nextIdx + 1) % players.length;
    } while (!players[nextIdx].alive);

    setCurrentPlayerIdx(nextIdx);
    setInputVal("");
    setErrorMsg("");
    const nextTimer = diff.timerMin + Math.random() * (diff.timerMax - diff.timerMin);
    setTimerMax(nextTimer);
    setTimerLeft(nextTimer);
    setPhase(PH.PASS);
  };

  const flashError = (msg) => {
    setErrorMsg(msg);
    setShowError(true);
    setTimeout(() => setShowError(false), 500);
    setInputVal("");
  };

  // Timer visual
  const timerFrac = timerLeft / timerMax;
  const timerColor = timerFrac > 0.5 ? "#3cff6e" : timerFrac > 0.25 ? "#ffcc00" : "#ff3c3c";
  const timerUrgent = timerFrac < 0.25;

  // Render current word with highlighted ending
  const renderWord = (word, numLetters) => {
    if (!word) return null;
    const base = word.slice(0, -numLetters);
    const highlight = word.slice(-numLetters);
    return (
      <div className="WORD" style={timerUrgent && phase === PH.PLAY ? {animation:"shake 0.3s infinite"} : {}}>
        <span>{base}</span>
        <span style={{color:"#ffcc00",textShadow:"0 0 20px #ffcc0088"}}>{highlight}</span>
      </div>
    );
  };

  // Player ring
  const PlayerRing = () => (
    <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginBottom:8}}>
      {players.map((p,i) => {
        const isCurrent = i === currentPlayerIdx && p.alive;
        const hearts = Array.from({length:livesPerPlayer}, (_,j) => j < p.lives ? "❤️" : "🖤").join("");
        return (
          <div key={i} style={{
            background: isCurrent ? "#2a0000" : "#12121a",
            border: `1px solid ${isCurrent ? "#ff3c3c" : p.alive ? "#2a2a3a" : "#1a1a1a"}`,
            borderRadius:6, padding:"6px 10px", fontSize:11,
            opacity: p.alive ? 1 : 0.35, textAlign:"center", minWidth:60,
            transition:"all .3s",
            ...(isCurrent ? {boxShadow:"0 0 12px #ff3c3c44"} : {}),
          }}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,
              color: isCurrent ? "#ff3c3c" : p.alive ? "#f0ede8" : "#555",
              textDecoration: p.alive ? "none" : "line-through",
            }}>
              {!p.alive && "❌ "}{p.name}
            </div>
            <div style={{fontSize:10,marginTop:2}}>{hearts}</div>
          </div>
        );
      })}
    </div>
  );

  return (
    <div style={{minHeight:"100dvh",background:"#0a0a0f",color:"#f0ede8",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px 56px"}}>
      <style>{`
        .T{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,8vw,72px);letter-spacing:6px;color:#ff3c3c;text-shadow:4px 4px 0 #7a0000,0 0 40px #ff3c3c88;line-height:1}
        .SUB{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:#666;text-transform:uppercase}
        .card{background:#12121a;border:1px solid #2a2a3a;border-radius:8px;padding:20px;width:100%;max-width:460px;position:relative;overflow:hidden}
        .btn{background:#ff3c3c;color:#fff;border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;width:100%;border-radius:6px;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .btn:hover:not(:disabled){background:#ff5555;transform:translateY(-1px);box-shadow:0 4px 20px #ff3c3c55}
        .btn:active:not(:disabled){transform:scale(.98)}
        .btn:disabled{opacity:.35;cursor:not-allowed}
        .ghost{background:transparent;color:#888;border:1px solid #2a2a3a;padding:10px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;border-radius:6px;transition:all .15s;width:100%;-webkit-tap-highlight-color:transparent}
        .ghost:hover{border-color:#ff3c3c;color:#ff3c3c}
        .ghost:active{transform:scale(.98)}
        .inp{background:#1a1a28;border:1px solid #2a2a3a;color:#f0ede8;padding:10px 14px;font-family:'Space Mono',monospace;font-size:14px;border-radius:6px;width:100%;outline:none;transition:border-color .2s}
        .inp:focus{border-color:#ff3c3c;box-shadow:0 0 0 3px #ff3c3c22}
        .cbt{background:#1a1a28;border:1px solid #2a2a3a;color:#f0ede8;width:36px;height:36px;font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:monospace;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .cbt:hover:not(:disabled){border-color:#ff3c3c;color:#ff3c3c}
        .cbt:active:not(:disabled){transform:scale(.92)}
        .cbt:disabled{opacity:.25;cursor:not-allowed}
        .WORD{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,12vw,88px);letter-spacing:6px;color:#f0ede8;text-align:center;line-height:1;padding:16px 0}
        .tab{flex:1;background:transparent;border:1px solid #2a2a3a;color:#666;padding:10px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .15s;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
        .tab:first-child{border-radius:6px 0 0 6px}
        .tab:last-child{border-radius:0 6px 6px 0}
        .tab.a{background:#1a1a28;border-color:#ff3c3c;color:#f0ede8}
        .hr{border:none;border-top:1px solid #1e1e2e;margin:12px 0}
        .fi{animation:fi .4s cubic-bezier(.2,.8,.3,1)}
        @keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes confDrop{0%{transform:translateY(0) rotate(0deg);opacity:.9}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
        @keyframes boomPulse{0%{transform:scale(0);opacity:1}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
        @keyframes flashRed{0%{box-shadow:0 0 0 0 #ff3c3c88}50%{box-shadow:0 0 30px 10px #ff3c3c44}100%{box-shadow:0 0 0 0 transparent}}
        @keyframes flashGreen{0%{box-shadow:0 0 0 0 #3cff6e88}50%{box-shadow:0 0 30px 10px #3cff6e44}100%{box-shadow:0 0 0 0 transparent}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        @keyframes elimFade{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.5)}}
        .sl{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:0}
        .wrap{position:relative;z-index:1;width:100%;max-width:460px;display:flex;flex-direction:column;gap:16px}
        .diff-opt{background:#1a1a28;border:1px solid #2a2a3a;border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .diff-opt:hover{border-color:#ff3c3c55}
        .diff-opt.sel{border-color:#ff3c3c;background:#2a0000}
        .timer-bar{height:6px;border-radius:3px;transition:background .3s}
        .chain-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
        .chain-arrow{color:#555;font-size:10px}
      `}</style>
      <div className="sl" />
      {showConfetti && <Confetti />}
      {showExplosion && <Explosion />}
      <div className="wrap">

        {/* HEADER */}
        <div style={{textAlign:"center"}}>
          <div className="T">SAMBUNG KATA</div>
          <div className="SUB" style={{marginTop:4}}>permainan kata keluarga</div>
        </div>

        {/* ═══════════ SETUP ═══════════ */}
        {phase === PH.SETUP && (
          <div className="card fi">
            <div style={{display:"flex",marginBottom:20}}>
              {[["pemain","Pemain"],["aturan","Aturan"],["cara","Cara"]].map(([k,l]) => (
                <button key={k} className={"tab" + (setupTab===k?" a":"")} onClick={() => setSetupTab(k)}>{l}</button>
              ))}
            </div>

            {setupTab === "pemain" && (
              <div>
                <div className="SUB" style={{marginBottom:12}}>jumlah pemain</div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,justifyContent:"center"}}>
                  <button className="cbt" onClick={() => setPlayerCount(Math.max(2,playerCount-1))} disabled={playerCount<=2}>−</button>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:3,color:"#ff3c3c",minWidth:40,textAlign:"center"}}>{playerCount}</span>
                  <button className="cbt" onClick={() => setPlayerCount(Math.min(8,playerCount+1))} disabled={playerCount>=8}>+</button>
                </div>
                <div className="SUB" style={{marginBottom:10}}>nama pemain</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {names.map((n,i) => (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:"#555",minWidth:20}}>{i+1}</span>
                      <input className="inp" value={n}
                        onChange={e => {const u=[...names]; u[i]=e.target.value; setNames(u);}}
                        placeholder={"Pemain " + (i+1)}
                      />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {setupTab === "aturan" && (
              <div>
                <div className="SUB" style={{marginBottom:14}}>kesulitan</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                  {Object.entries(DIFF).map(([key,d]) => (
                    <div key={key} className={"diff-opt" + (difficulty===key?" sel":"")} onClick={() => setDifficulty(key)}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:3,color:difficulty===key?"#ff3c3c":"#f0ede8"}}>{d.label}</span>
                        {difficulty===key && <span style={{color:"#ff3c3c",fontSize:14}}>✓</span>}
                      </div>
                      <div style={{fontSize:10,color:"#555",marginTop:4}}>{d.desc}</div>
                    </div>
                  ))}
                </div>

                <div className="SUB" style={{marginBottom:12}}>nyawa per pemain</div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,justifyContent:"center"}}>
                  <button className="cbt" onClick={() => setLivesPerPlayer(2)} style={livesPerPlayer===2?{borderColor:"#ff3c3c",color:"#ff3c3c"}:{}}>2</button>
                  <button className="cbt" onClick={() => setLivesPerPlayer(3)} style={livesPerPlayer===3?{borderColor:"#ff3c3c",color:"#ff3c3c"}:{}}>3</button>
                </div>
                <div style={{textAlign:"center",fontSize:20,marginBottom:16}}>
                  {Array.from({length:livesPerPlayer}, () => "❤️").join(" ")}
                </div>

                <div className="SUB" style={{marginBottom:10}}>kata awal (kosongkan = acak)</div>
                <input className="inp" value={customWord} onChange={e => setCustomWord(e.target.value)}
                  placeholder="Contoh: MAKAN" style={{textTransform:"uppercase"}}
                />
              </div>
            )}

            {setupTab === "cara" && (
              <div style={{fontSize:12,color:"#888",lineHeight:1.8}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#ff3c3c",marginBottom:12}}>CARA BERMAIN</div>
                <p style={{marginBottom:10}}>
                  <b style={{color:"#f0ede8"}}>1.</b> Sebuah kata ditampilkan di layar.
                </p>
                <p style={{marginBottom:10}}>
                  <b style={{color:"#f0ede8"}}>2.</b> Pemain harus mengetik kata baru yang dimulai dengan <b style={{color:"#ffcc00"}}>{diff.letters} huruf terakhir</b> dari kata sebelumnya.
                </p>
                <p style={{marginBottom:10}}>
                  <b style={{color:"#f0ede8"}}>3.</b> Timer berjalan! Jika waktu habis — BOOM! Kehilangan 1 nyawa.
                </p>
                <p style={{marginBottom:10}}>
                  <b style={{color:"#f0ede8"}}>4.</b> Kata tidak boleh diulang dan minimal 3 huruf.
                </p>
                <p style={{marginBottom:10}}>
                  <b style={{color:"#f0ede8"}}>5.</b> Pemain terakhir yang masih hidup menang!
                </p>
                <div style={{background:"#1a1a28",border:"1px solid #2a2a3a",borderRadius:6,padding:12,marginTop:12}}>
                  <div style={{color:"#ffcc00",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,marginBottom:6}}>CONTOH {diff.letters === 1 ? "(1 HURUF)" : "(2 HURUF)"}</div>
                  {diff.letters === 2 ? (
                    <div style={{color:"#f0ede8",fontSize:13}}>
                      MA<b style={{color:"#ffcc00"}}>KAN</b> → <b style={{color:"#ffcc00"}}>KAN</b>TOR → TOR<b style={{color:"#ffcc00"}}>PEDO</b> → <b style={{color:"#ffcc00"}}>DO</b>BEL → ...
                    </div>
                  ) : (
                    <div style={{color:"#f0ede8",fontSize:13}}>
                      MAKA<b style={{color:"#ffcc00"}}>N</b> → <b style={{color:"#ffcc00"}}>N</b>ANTI → NANT<b style={{color:"#ffcc00"}}>I</b> → <b style={{color:"#ffcc00"}}>I</b>NDO → ...
                    </div>
                  )}
                </div>
              </div>
            )}

            <div style={{marginTop:20}}>
              <button className="btn" onClick={startGame}>MULAI GAME</button>
            </div>
          </div>
        )}

        {/* ═══════════ PASS SCREEN ═══════════ */}
        {phase === PH.PASS && players.length > 0 && (
          <div className="card fi" style={{textAlign:"center"}}>
            <PlayerRing />
            <div className="hr" />
            <div style={{fontSize:48,marginBottom:12,opacity:.6}}>🔗</div>
            <div className="SUB" style={{marginBottom:8}}>berikan ke</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:5,color:"#ff3c3c",marginBottom:12}}>
              {players[currentPlayerIdx]?.name}
            </div>
            <div style={{background:"#1a1a28",border:"1px solid #2a2a3a",borderRadius:8,padding:16,marginBottom:16}}>
              <div className="SUB" style={{marginBottom:6}}>kata sekarang</div>
              {renderWord(currentWord, diff.letters)}
              <div style={{fontSize:14,color:"#ffcc00",fontFamily:"'Space Mono',monospace",letterSpacing:3,marginTop:4}}>
                Mulai dengan: <b style={{fontSize:18}}>{requiredStart}</b>
              </div>
            </div>
            <div style={{fontSize:11,color:"#555",marginBottom:16}}>
              Pastikan hanya <b style={{color:"#f0ede8"}}>{players[currentPlayerIdx]?.name}</b> yang melihat layar
            </div>
            <button className="btn" onClick={startTurn}>AKU SIAP</button>
          </div>
        )}

        {/* ═══════════ PLAY ═══════════ */}
        {phase === PH.PLAY && players.length > 0 && (
          <div className="card fi" style={{
            textAlign:"center",
            ...(showError ? {animation:"flashRed 0.5s ease-out"} : {}),
            ...(showSuccess ? {animation:"flashGreen 0.4s ease-out"} : {}),
          }}>
            <PlayerRing />
            <div className="hr" />

            {/* Current player */}
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:4,color:"#ff3c3c",marginBottom:4}}>
              {players[currentPlayerIdx]?.name}
            </div>

            {/* Timer bar */}
            <div style={{background:"#1a1a28",borderRadius:4,height:8,overflow:"hidden",marginBottom:16,position:"relative"}}>
              <div className="timer-bar" style={{
                width: (timerFrac * 100) + "%",
                background: timerColor,
                height:"100%",
                ...(timerUrgent ? {animation:"pulse 0.4s infinite"} : {}),
              }} />
            </div>

            {/* Current word */}
            {renderWord(currentWord, diff.letters)}

            {/* Required start */}
            <div style={{fontSize:16,color:"#ffcc00",fontFamily:"'Space Mono',monospace",letterSpacing:3,marginBottom:16}}>
              Mulai dengan: <b style={{fontSize:22}}>{requiredStart}</b>
            </div>

            {/* Input */}
            <form onSubmit={e => { e.preventDefault(); submitWord(); }} style={{marginBottom:12}}>
              <div style={{display:"flex",gap:8}}>
                <input
                  ref={inputRef}
                  className="inp"
                  value={inputVal}
                  onChange={e => setInputVal(e.target.value)}
                  placeholder={`Ketik kata yang dimulai dengan '${requiredStart}'...`}
                  autoComplete="off"
                  autoCapitalize="characters"
                  style={{
                    fontSize:18,
                    textTransform:"uppercase",
                    fontFamily:"'Bebas Neue',sans-serif",
                    letterSpacing:3,
                    ...(showError ? {borderColor:"#ff3c3c",animation:"shake 0.3s"} : {}),
                  }}
                />
                <button type="submit" className="btn" style={{width:"auto",padding:"10px 20px",fontSize:18}}>→</button>
              </div>
            </form>

            {/* Error message */}
            {errorMsg && (
              <div style={{color:"#ff3c3c",fontSize:12,fontFamily:"'Space Mono',monospace",marginBottom:8,animation:"fi 0.3s"}}>
                {errorMsg}
              </div>
            )}

            {/* Used words chain (last 10) */}
            {wordChain.length > 1 && (
              <div style={{marginTop:8}}>
                <div className="SUB" style={{marginBottom:6,fontSize:9}}>rantai kata</div>
                <div style={{maxHeight:120,overflowY:"auto",background:"#0e0e18",borderRadius:6,padding:8}}>
                  {wordChain.slice(-10).map((item,i,arr) => (
                    <span key={i} style={{fontSize:11,color:i===arr.length-1?"#ffcc00":"#666"}}>
                      {item.word}{i < arr.length-1 && <span style={{color:"#333"}}> → </span>}
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ═══════════ BOOM ═══════════ */}
        {phase === PH.BOOM && boomPlayer && (
          <div className="card fi" style={{textAlign:"center"}}>
            <div style={{fontSize:64,marginBottom:12}}>💥</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:4,color:"#ff3c3c",marginBottom:8}}>
              WAKTU HABIS!
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3,marginBottom:12}}>
              {boomPlayer.name}
            </div>
            {boomPlayer.died ? (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:40,marginBottom:8}}>☠️</div>
                <div style={{color:"#ff3c3c",fontFamily:"'Space Mono',monospace",fontSize:13,letterSpacing:2}}>TERELIMINASI!</div>
              </div>
            ) : (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:14,color:"#ffcc00"}}>Kehilangan 1 nyawa!</div>
                <div style={{fontSize:20,marginTop:4}}>
                  {(() => {
                    const p = players.find(p => p.name === boomPlayer.name);
                    if (!p) return null;
                    return Array.from({length:livesPerPlayer}, (_,j) => j < p.lives ? "❤️" : "🖤").join(" ");
                  })()}
                </div>
              </div>
            )}
            <button className="btn" onClick={afterBoom}>LANJUT</button>
          </div>
        )}

        {/* ═══════════ RESULT ═══════════ */}
        {phase === PH.RESULT && (
          <div className="card fi" style={{textAlign:"center"}}>
            <div style={{fontSize:64,marginBottom:8}}>🏆</div>
            <div className="SUB" style={{marginBottom:8}}>pemenang</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(40px,10vw,72px)",letterSpacing:6,color:"#ffcc00",textShadow:"0 0 30px #ffcc0044",marginBottom:16}}>
              {winner || "SERI!"}
            </div>

            {/* Elimination order */}
            {elimOrder.length > 0 && (
              <div style={{marginBottom:16}}>
                <div className="SUB" style={{marginBottom:8}}>urutan eliminasi</div>
                {elimOrder.map((name,i) => (
                  <div key={i} style={{fontSize:12,color:"#888",padding:"3px 0"}}>
                    <span style={{color:"#ff3c3c"}}>#{i+1}</span> {name}
                  </div>
                ))}
              </div>
            )}

            <div className="hr" />

            {/* Stats */}
            <div style={{marginBottom:16}}>
              <div className="SUB" style={{marginBottom:10}}>statistik</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div style={{background:"#1a1a28",borderRadius:6,padding:10}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#3cff6e"}}>{totalWords}</div>
                  <div style={{fontSize:9,color:"#666",letterSpacing:1}}>TOTAL KATA</div>
                </div>
                <div style={{background:"#1a1a28",borderRadius:6,padding:10}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#ffcc00"}}>{longestChain}</div>
                  <div style={{fontSize:9,color:"#666",letterSpacing:1}}>RANTAI TERPANJANG</div>
                </div>
                <div style={{background:"#1a1a28",borderRadius:6,padding:10}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:"#a0a0ff"}}>{longestWord}</div>
                  <div style={{fontSize:9,color:"#666",letterSpacing:1}}>KATA TERPANJANG</div>
                </div>
              </div>
            </div>

            <div className="hr" />

            {/* Full chain */}
            <div style={{marginBottom:16}}>
              <div className="SUB" style={{marginBottom:8}}>rantai kata lengkap</div>
              <div style={{maxHeight:200,overflowY:"auto",background:"#0e0e18",borderRadius:6,padding:12,textAlign:"left"}}>
                {wordChain.map((item,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:i<wordChain.length-1?"1px solid #1a1a28":"none"}}>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:"#555",minWidth:20}}>{i+1}</span>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:i===0?"#666":"#f0ede8",flex:1}}>{item.word}</span>
                    <span style={{fontSize:10,color:"#555"}}>{item.player}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button className="btn" onClick={startGame}>MAIN LAGI</button>
              <button className="ghost" onClick={() => { setPhase(PH.SETUP); setShowConfetti(false); }}>PENGATURAN</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
