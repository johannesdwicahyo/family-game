name: Huddle
options:
  bundleIdPrefix: com.johannesdwicahyo
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6"
targets:
  Huddle:
    type: application
    platform: iOS
    sources:
      - Huddle
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.johannesdwicahyo.Huddle
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      SWIFT_STRICT_CONCURRENCY: complete
